<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vertera Uzbekistan</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--accent:#2d8a5e;--accent2:#1a5c3a;--bg:#f0f7f4;--card:#ffffff;--text:#1a1a2e;--muted:#6b7c76;--r:16px;--sh:0 2px 14px rgba(45,138,94,0.10);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1a5c3a 0%,#2d8a5e 60%,#3db876 100%);padding:14px 14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(45,138,94,0.3);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;}
.logo-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.logo-icon{width:36px;height:36px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid rgba(255,255,255,0.3);flex-shrink:0;}
.logo-text{font-family:'Raleway',sans-serif;font-weight:800;font-size:20px;color:#fff;letter-spacing:1px;line-height:1.1;}
.logo-sub{font-size:9px;color:rgba(255,255,255,0.75);letter-spacing:1.5px;text-transform:uppercase;}
.lang-sw{display:flex;gap:3px;background:rgba(255,255,255,0.18);border-radius:20px;padding:3px;flex-shrink:0;}
.lang-btn{padding:4px 11px;border-radius:16px;border:none;background:transparent;color:rgba(255,255,255,0.8);font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;letter-spacing:0.5px;}
.lang-btn.active{background:#fff;color:var(--accent);}
.search-wrap{position:relative;}
.search-in{width:100%;padding:11px 38px 11px 38px;border-radius:50px;border:none;background:rgba(255,255,255,0.95);font-family:'Nunito',sans-serif;font-size:15px;color:var(--text);outline:none;}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:0.4;pointer-events:none;}
.search-clr{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:14px;opacity:0.5;cursor:pointer;display:none;background:none;border:none;padding:4px;color:var(--text);}

/* CATEGORIES */
.cats{overflow-x:auto;padding:10px 12px 0;display:flex;gap:7px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.cats::-webkit-scrollbar{display:none;}
.cat{white-space:nowrap;padding:6px 14px;border-radius:50px;border:1.5px solid #c8e6d4;background:#fff;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;flex-shrink:0;}
.cat.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* GRID */
.grid-sec{padding:12px 10px 90px;}
.sec-title{font-family:'Raleway',sans-serif;font-weight:700;font-size:16px;color:var(--text);margin-bottom:10px;padding:0 2px;display:flex;align-items:center;gap:8px;}
.cnt-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:50px;margin-left:auto;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}

/* CARD */
.card{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:transform .18s;border:1px solid rgba(45,138,94,0.07);display:flex;flex-direction:column;}
.card:active{transform:scale(0.97);}
.card-img-wrap{position:relative;width:100%;padding-bottom:70%;background:#edf7f2;overflow:hidden;flex-shrink:0;}
.card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:8px;}
.card-placeholder{position:absolute;inset:0;font-size:40px;display:none;align-items:center;justify-content:center;background:#edf7f2;}
.card-badge{position:absolute;top:6px;left:6px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:50px;text-transform:uppercase;z-index:2;}
.card-badge.new{background:#e74c3c;}
.card-badge.hit{background:#f39c12;}
.card-body{padding:9px 10px 10px;flex:1;display:flex;flex-direction:column;background:#fff;}
.card-name{font-family:'Raleway',sans-serif;font-weight:700;font-size:13px;line-height:1.3;color:#1a1a2e;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-desc{font-size:11px;color:#6b7c76;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-price{font-family:'Raleway',sans-serif;font-weight:800;font-size:12px;color:var(--accent);margin-top:5px;}
.card-arrow{display:flex;align-items:center;justify-content:flex-end;margin-top:auto;padding-top:5px;color:var(--accent);font-size:11px;font-weight:700;}

/* NO RESULTS */
.no-res{text-align:center;padding:60px 20px;color:var(--muted);display:none;}
.no-res-ico{font-size:48px;margin-bottom:12px;}

/* OVERLAY + SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;}
.overlay.show{display:block;}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:22px 22px 0 0;z-index:300;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);scrollbar-width:none;padding-bottom:40px;}
.sheet::-webkit-scrollbar{display:none;}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:#d0d8d4;border-radius:2px;margin:12px auto 0;}
.sheet-close{position:absolute;top:12px;right:14px;width:30px;height:30px;background:#f0f4f2;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-size:14px;color:#666;}
.sheet-img-wrap{width:100%;height:220px;background:#edf7f2;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:6px;}
.sheet-img{width:100%;height:100%;object-fit:contain;padding:16px;}
.sheet-img-ph{font-size:70px;opacity:0.3;}
.sheet-content{padding:16px 16px 0;}
.sheet-cat{display:inline-flex;align-items:center;gap:5px;background:#e2f4ec;color:var(--accent);font-size:11px;font-weight:700;padding:4px 10px;border-radius:50px;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.7px;}
.sheet-title{font-family:'Raleway',sans-serif;font-weight:800;font-size:21px;line-height:1.2;color:#1a1a2e;margin-bottom:4px;}
.sheet-price-line{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.sheet-price{font-family:'Raleway',sans-serif;font-weight:800;font-size:18px;color:var(--accent);}
.sheet-pv{font-size:12px;color:var(--muted);background:#f0f7f4;padding:3px 9px;border-radius:50px;}
.sheet-sub{font-size:13px;color:#6b7c76;line-height:1.5;margin-bottom:14px;}
.tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.tag{background:#e2f4ec;color:var(--accent);font-size:11px;font-weight:600;padding:4px 10px;border-radius:50px;}
.tag.halal{background:#fff3e0;color:#c07000;}
.tag.kosher{background:#e8eaf6;color:#3949ab;}

/* INFO BLOCKS */
.info-block{background:#f5fbf7;border-radius:14px;padding:14px;margin-bottom:10px;border-left:3px solid var(--accent);}
.info-title{font-family:'Raleway',sans-serif;font-weight:700;font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.info-text{font-size:13px;line-height:1.65;color:#1a1a2e;}
.info-text ul{padding-left:0;margin-top:6px;list-style:none;}
.info-text li{margin-bottom:8px;padding-left:0;}
.info-text li strong{color:#1a1a2e;font-weight:700;}
.ingr-item{margin-bottom:10px;padding:10px 12px;background:#fff;border-radius:10px;border:1px solid #d4e9df;}
.ingr-name{font-weight:700;font-size:13px;color:var(--accent2);margin-bottom:3px;}
.ingr-desc{font-size:12.5px;color:#1a1a2e;line-height:1.55;}

/* DOSAGE */
.dosage-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px;}
.dosage-item{background:#fff;border-radius:10px;padding:8px 10px;border:1px solid #c8e6d4;}
.dosage-lbl{font-size:9px;color:#6b7c76;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:2px;}
.dosage-val{font-weight:700;font-size:12px;color:#1a1a2e;}

/* CERT BADGES */
.cert-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.cert-badge{background:#e2f4ec;color:var(--accent2);font-size:10px;font-weight:700;padding:3px 9px;border-radius:50px;border:1px solid #b8ddd0;}

/* REGISTER BTN */
.reg-btn{display:block;margin:14px 0 0;background:linear-gradient(135deg,#1a5c3a,#2d8a5e);color:#fff;text-align:center;padding:15px;border-radius:14px;text-decoration:none;font-family:'Raleway',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.3px;box-shadow:0 4px 14px rgba(45,138,94,0.35);}
.reg-btn:active{opacity:0.85;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="logo-wrap">
      <div class="logo-icon">🌿</div>
      <div>
        <div class="logo-text">VERTERA</div>
        <div class="logo-sub" id="logoSub">Справочник продуктов</div>
      </div>
    </div>
    <div class="lang-sw">
      <button class="lang-btn active" onclick="setLang('ru')">RU</button>
      <button class="lang-btn" onclick="setLang('uz')">UZ</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input class="search-in" type="text" id="searchInput" placeholder="Найти продукт..." autocomplete="off"/>
    <button class="search-clr" id="searchClr" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="cats" id="catsRow">
  <div class="cat active" data-cat="all">Все</div>
  <div class="cat" data-cat="гели">Гели</div>
  <div class="cat" data-cat="капсулы">Капсулы/БАДы</div>
  <div class="cat" data-cat="косметика">Косметика</div>
</div>

<div class="grid-sec">
  <div class="sec-title">
    <span id="catTitle">Каталог</span>
    <div class="cnt-badge" id="cntBadge">13</div>
  </div>
  <div class="grid" id="productsGrid"></div>
  <div class="no-res" id="noRes">
    <div class="no-res-ico">🌿</div>
    <h3 id="noResTitle">Ничего не найдено</h3>
    <p id="noResSub">Попробуйте другой запрос</p>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <button class="sheet-close" onclick="closeSheet()">✕</button>
  <div id="sheetInner"></div>
</div>

function setLang(l){
  currentLang = l;

  document.querySelectorAll(".lang-btn").forEach(b=>b.classList.toggle("active",b.textContent===l.toUpperCase()));

// ══════════════════════════════
// STATE
// ══════════════════════════════
let currentCat = "all";
let searchQuery = "";

// ══════════════════════════════
// RENDER GRID
// ══════════════════════════════
function renderGrid(){
  const grid = document.getElementById("productsGrid");
  const noRes = document.getElementById("noRes");
  const cnt = document.getElementById("cntBadge");
  const L = LANG[currentLang];

  let filtered = PRODUCTS;
  if(currentCat !== "all") filtered = filtered.filter(p=>p.cat===currentCat);
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p=>{
      const name = currentLang==="uz" && p.name_uz ? p.name_uz : p.name;
      const short = currentLang==="uz" && p.short_uz ? p.short_uz : p.short;
      return name.toLowerCase().includes(q) || short.toLowerCase().includes(q) ||
             p.description.toLowerCase().includes(q);
    });
  }

  cnt.textContent = filtered.length;

  if(!filtered.length){
    grid.innerHTML="";
    noRes.style.display="block";
    return;
  }
  noRes.style.display="none";

  grid.innerHTML = filtered.map(p=>{
    const name = currentLang==="uz" && p.name_uz ? p.name_uz : p.name;
    const short = currentLang==="uz" && p.short_uz ? p.short_uz : p.short;
    const price = currentLang==="uz" && p.price_uz ? p.price_uz : p.price;
    const badgeHTML = p.badge ? `<div class="card-badge ${p.badge}">${p.badge==="hit"?"Хит":"Новинка"}</div>` : "";
    const imgHTML = p.img
      ? `<img class="card-img" src="${p.img}" alt="${name}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
           onload="this.style.display='block'" style="display:block"/>`
      : "";
    return `
    <div class="card" onclick="openProduct(${p.id})">
      <div class="card-img-wrap">
        ${badgeHTML}
        ${imgHTML}
        <div class="card-placeholder" style="${p.img?'':'display:flex'}">${p.emoji}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${name}</div>
        <div class="card-desc">${short}</div>
        <div class="card-price">${price}</div>
        <div class="card-arrow">${L.more}</div>
      </div>
    </div>`;
  }).join("");
}

// ══════════════════════════════
// OPEN PRODUCT
// ══════════════════════════════
function openProduct(id){
  const p = PRODUCTS.find(x=>x.id===id);
  if(!p) return;
  const L = LANG[currentLang];
  const isUz = currentLang==="uz";

  const name = isUz && p.name_uz ? p.name_uz : p.name;
  const short = isUz && p.short_uz ? p.short_uz : p.short;
  const desc = isUz && p.description_uz ? p.description_uz : p.description;
  const usage = isUz && p.usage_uz ? p.usage_uz : p.usage;
  const storage = isUz && p.storage_uz ? p.storage_uz : p.storage;
  const contraind = isUz && p.contraind_uz ? p.contraind_uz : p.contraind;
  const price = isUz && p.price_uz ? p.price_uz : p.price;

  // tags
  const tagMap = {vegan:"🌱 Vegan", halal:"☪️ Halal", kosher:"✡️ Kosher"};
  const tagClass = {vegan:"tag",halal:"tag halal",kosher:"tag kosher"};
  const tagsHTML = p.tags.map(t=>`<span class="${tagClass[t]}">${tagMap[t]}</span>`).join("");

  // certs
  const certsHTML = p.certs.map(c=>`<span class="cert-badge">${c}</span>`).join("");

  // ingredients
  const ingrHTML = p.ingredients.map(i=>{
    const iname = isUz && i.name_uz ? i.name_uz : i.name;
    const idesc = isUz && i.desc_uz ? i.desc_uz : i.desc;
    return `<div class="ingr-item"><div class="ingr-name">${iname}</div><div class="ingr-desc">${idesc}</div></div>`;
  }).join("");

  // dosage
  const dosageHTML = p.dosage.map(d=>{
    const lbl = isUz && d.lbl_uz ? d.lbl_uz : d.lbl;
    return `<div class="dosage-item"><div class="dosage-lbl">${lbl}</div><div class="dosage-val">${d.val}</div></div>`;
  }).join("");

  const imgHTML = p.img
    ? `<img class="sheet-img" src="${p.img}" alt="${name}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
       <div class="sheet-img-ph" style="display:none">${p.emoji}</div>`
    : `<div class="sheet-img-ph">${p.emoji}</div>`;

  const pvHTML = p.pv ? `<span class="sheet-pv">PV: ${p.pv}</span>` : "";

  // usage with line breaks
  const usageFormatted = usage.replace(/\n/g,"<br>");

  document.getElementById("sheetInner").innerHTML = `
    <div class="sheet-img-wrap">${imgHTML}</div>
    <div class="sheet-content">
      <div class="sheet-cat">🌿 ${p.cat}</div>
      <div class="sheet-title">${name}</div>
      <div class="sheet-price-line">
        <div class="sheet-price">${price}</div>
        ${pvHTML}
      </div>
      <div class="sheet-sub">${short}</div>
      ${tagsHTML ? `<div class="tags-row">${tagsHTML}</div>` : ""}
      ${certsHTML ? `<div class="cert-row">${certsHTML}</div>` : ""}

      <div class="info-block">
        <div class="info-title">${L.about}</div>
        <div class="info-text">${desc}</div>
      </div>

      <div class="info-block">
        <div class="info-title">${L.ingr}</div>
        <div class="info-text">${ingrHTML}</div>
      </div>

      <div class="info-block">
        <div class="info-title">${L.usage}</div>
        <div class="info-text">${usageFormatted}</div>
        <div class="dosage-grid">${dosageHTML}</div>
      </div>

      <div class="info-block">
        <div class="info-title">${L.storage}</div>
        <div class="info-text">${storage}</div>
      </div>

      <div class="info-block">
        <div class="info-title">${L.contraind}</div>
        <div class="info-text">${contraind}</div>
      </div>

      <a class="reg-btn" href="https://t.me/VERTERA_UZBEKISTAN_BOT" target="_blank">
        ${L.regBtn}
      </a>
    </div>`;

  document.getElementById("overlay").classList.add("show");
  setTimeout(()=>document.getElementById("sheet").classList.add("open"),10);
  document.body.style.overflow="hidden";

  if(window.Telegram?.WebApp?.BackButton){
    Telegram.WebApp.BackButton.show();
    Telegram.WebApp.BackButton.onClick(closeSheet);
  }
}

function closeSheet(){
  document.getElementById("sheet").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
  document.body.style.overflow="";
  if(window.Telegram?.WebApp?.BackButton) Telegram.WebApp.BackButton.hide();
}

// ══════════════════════════════
// SEARCH
// ══════════════════════════════
const si = document.getElementById("searchInput");
const sc = document.getElementById("searchClr");
si.addEventListener("input",()=>{
  searchQuery = si.value.trim();
  sc.style.display = searchQuery ? "block" : "none";
  renderGrid();
});
function clearSearch(){ si.value=""; searchQuery=""; sc.style.display="none"; si.focus(); renderGrid(); }

// ══════════════════════════════
// CATEGORY TABS
// ══════════════════════════════
document.querySelectorAll(".cat").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".cat").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    currentCat = tab.dataset.cat;
    renderGrid();
  });
});

// ══════════════════════════════
// TELEGRAM INIT
// ══════════════════════════════
if(window.Telegram?.WebApp){
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// ══════════════════════════════
// INIT
// ══════════════════════════════
renderGrid();
</script>
