<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vertera — Справочник продуктов</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">

  :root {
    --tg-theme-bg-color: #ffffff;
    --tg-theme-text-color: #1a1a2e;
    --tg-theme-hint-color: #7f8c8d;
    --tg-theme-link-color: #2d8a5e;
    --tg-theme-button-color: #2d8a5e;
    --tg-theme-button-text-color: #ffffff;
    --accent: #2d8a5e;
    --accent2: #4ecb8a;
    --bg: #f0f7f4;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-muted: #7a8a85;
    --radius: 18px;
    --shadow: 0 4px 20px rgba(45,138,94,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ——— HEADER ——— */
  .header {
    background: linear-gradient(135deg, #1a5c3a 0%, #2d8a5e 60%, #4ecb8a 100%);
    padding: 20px 16px 28px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(45,138,94,0.3);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3);
  }
  .logo-text {
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: #fff;
    letter-spacing: 1px;
  }
  .logo-sub {
    font-size: 10px;
    color: rgba(255,255,255,0.75);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: -2px;
  }

  /* ——— SEARCH ——— */
  .search-wrap {
    position: relative;
  }
  .search-input {
    width: 100%;
    padding: 12px 44px 12px 44px;
    border-radius: 50px;
    border: none;
    background: rgba(255,255,255,0.92);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    box-shadow: 0 2px 16px rgba(0,0,0,0.12);
    transition: all .2s;
  }
  .search-input:focus {
    background: #fff;
    box-shadow: 0 4px 24px rgba(45,138,94,0.25);
  }
  .search-icon {
    position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
    font-size: 17px; opacity: 0.5; pointer-events: none;
  }
  .search-clear {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-size: 17px; opacity: 0.6; cursor: pointer; display: none;
    background: none; border: none; padding: 4px;
  }

  /* ——— CATEGORY TABS ——— */
  .cats-scroll {
    overflow-x: auto;
    padding: 12px 16px 0;
    display: flex;
    gap: 8px;
    scrollbar-width: none;
  }
  .cats-scroll::-webkit-scrollbar { display: none; }
  .cat-tab {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 50px;
    border: 1.5px solid #d4e9df;
    background: #fff;
    font-size: 13px;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .2s;
    flex-shrink: 0;
  }
  .cat-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 2px 10px rgba(45,138,94,0.3);
  }

  /* ——— GRID ——— */
  .grid-section {
    padding: 16px 12px 100px;
  }
  .section-title {
    font-family: 'Raleway', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--text);
    margin-bottom: 12px;
    padding: 0 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title span { color: var(--accent); }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  /* ——— PRODUCT CARD ——— */
  .product-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform .18s, box-shadow .18s;
    border: 1px solid rgba(45,138,94,0.08);
    position: relative;
  }
  .product-card:active { transform: scale(0.97); }

  .card-img-wrap {
    position: relative;
    width: 100%;
    height: 150px;
    background: linear-gradient(145deg, #e8f5ee, #f0f7f4);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform .3s;
  }
  .product-card:hover .card-img { transform: scale(1.04); }
  .card-img-placeholder {
    font-size: 48px;
    opacity: 0.4;
  }

  .card-badge {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 50px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .card-badge.new { background: #e74c3c; }
  .card-badge.hit { background: #f39c12; }

  .card-body {
    padding: 12px;
  }
  .card-name {
    font-family: 'Raleway', sans-serif;
    font-weight: 700;
    font-size: 13.5px;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 5px;
  }
  .card-desc {
    font-size: 11.5px;
    color: var(--text-muted);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-arrow {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-top: 8px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    gap: 3px;
  }

  /* ——— NO RESULTS ——— */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    display: none;
  }
  .no-results-icon { font-size: 48px; margin-bottom: 12px; }
  .no-results h3 { font-family: 'Raleway', sans-serif; font-size: 18px; margin-bottom: 6px; color: var(--text); }

  /* ——— DETAIL SHEET ——— */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    display: none;
    backdrop-filter: blur(3px);
  }
  .overlay.show { display: block; }

  .detail-sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    border-radius: 24px 24px 0 0;
    z-index: 300;
    max-height: 88vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(.4,0,.2,1);
    scrollbar-width: none;
    padding-bottom: 32px;
  }
  .detail-sheet::-webkit-scrollbar { display: none; }
  .detail-sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 40px; height: 4px;
    background: #d0d0d0;
    border-radius: 2px;
    margin: 14px auto 0;
  }
  .sheet-close {
    position: absolute; top: 14px; right: 16px;
    width: 32px; height: 32px;
    background: #f0f0f0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border: none;
    font-size: 16px;
    color: #888;
    transition: background .2s;
  }
  .sheet-close:active { background: #e0e0e0; }

  .sheet-img-wrap {
    width: 100%;
    height: 240px;
    background: linear-gradient(135deg, #e8f5ee 0%, #f0f7f4 100%);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    margin: 8px 0 0;
  }
  .sheet-img {
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 16px;
  }
  .sheet-img-placeholder { font-size: 80px; opacity: 0.3; }

  .sheet-content {
    padding: 20px 20px 0;
  }
  .sheet-category {
    display: inline-flex; align-items: center; gap: 5px;
    background: #e8f5ee;
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 50px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }
  .sheet-title {
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    font-size: 22px;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 8px;
  }
  .sheet-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .info-block {
    background: #f6fbf8;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    border-left: 3px solid var(--accent);
  }
  .info-block-title {
    font-family: 'Raleway', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .info-block-text {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
  }
  .info-block-text ul {
    padding-left: 16px;
    margin-top: 4px;
  }
  .info-block-text li { margin-bottom: 4px; }

  .dosage-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .dosage-item {
    background: #fff;
    border-radius: 12px;
    padding: 10px 12px;
    border: 1px solid #d4e9df;
  }
  .dosage-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 3px;
  }
  .dosage-val {
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
  }

  .tags-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 16px;
  }
  .tag {
    background: #e8f5ee;
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 50px;
  }
  .tag.vegan { background: #e8f5ee; color: #2d8a5e; }
  .tag.halal { background: #fff3e0; color: #e67e22; }
  .tag.kosher { background: #e8eaf6; color: #3f51b5; }

  .sheet-link {
    display: block;
    margin: 16px 0 0;
    background: var(--accent);
    color: #fff;
    text-align: center;
    padding: 14px;
    border-radius: 14px;
    text-decoration: none;
    font-family: 'Raleway', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
    transition: background .2s;
  }
  .sheet-link:active { background: #1a5c3a; }

  /* ——— COUNT BADGE ——— */
  .count-badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 50px;
    margin-left: auto;
  }
</style>
</head>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentCat = "all";
let searchQuery = "";

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function getBadgeHTML(badge) {
  if (!badge) return "";
  const labels = { hit: "Хит", new: "Новинка" };
  return `<div class="card-badge ${badge}">${labels[badge]}</div>`;
}

function getTagsHTML(tags) {
  return tags.map(t => {
    const labels = { vegan: "🌱 Vegan", halal: "☪️ Halal", kosher: "✡️ Kosher" };
    return `<span class="tag ${t}">${labels[t]}</span>`;
  }).join("");
}

function renderGrid() {
  const grid = document.getElementById("productsGrid");
  const noResults = document.getElementById("noResults");
  const countBadge = document.getElementById("countBadge");

  let filtered = PRODUCTS;
  if (currentCat !== "all") filtered = filtered.filter(p => p.category === currentCat);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.shortDesc.toLowerCase().includes(q) ||
      p.description.toLowerCase().includes(q) ||
      p.benefits.some(b => b.toLowerCase().includes(q))
    );
  }

  countBadge.textContent = filtered.length;

  if (!filtered.length) {
    grid.innerHTML = "";
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";

  grid.innerHTML = filtered.map(p => `
    <div class="product-card" onclick="openProduct(${p.id})">
      <div class="card-img-wrap">
        ${getBadgeHTML(p.badge)}
        <img class="card-img" src="${p.img}" alt="${p.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
        />
        <div class="card-img-placeholder" style="display:none">${p.emoji}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.shortDesc}</div>
        <div class="card-arrow">Подробнее <span>→</span></div>
      </div>
    </div>
  `).join("");
}

// ══════════════════════════════════════════════
//  OPEN PRODUCT DETAIL
// ══════════════════════════════════════════════
function openProduct(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;

  const dosageHTML = p.dosage.map(d => `
    <div class="dosage-item">
      <div class="dosage-label">${d.label}</div>
      <div class="dosage-val">${d.value}</div>
    </div>
  `).join("");

  const benefitsHTML = p.benefits.map(b => `<li>${b}</li>`).join("");

  document.getElementById("sheetInner").innerHTML = `
    <div class="sheet-img-wrap">
      <img class="sheet-img" src="${p.img}" alt="${p.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
      />
      <div class="sheet-img-placeholder" style="display:none">${p.emoji}</div>
    </div>
    <div class="sheet-content">
      <div class="sheet-category">🌿 ${p.category}</div>
      <div class="sheet-title">${p.name}</div>
      <div class="sheet-subtitle">${p.shortDesc}</div>
      <div class="tags-row">${getTagsHTML(p.tags)}</div>

      <div class="info-block">
        <div class="info-block-title">📋 О продукте</div>
        <div class="info-block-text">${p.description}</div>
      </div>

      <div class="info-block">
        <div class="info-block-title">✅ Польза</div>
        <div class="info-block-text"><ul>${benefitsHTML}</ul></div>
      </div>

      <div class="info-block">
        <div class="info-block-title">💊 Способ применения</div>
        <div class="info-block-text">${p.usage}</div>
        <div class="dosage-grid">${dosageHTML}</div>
      </div>

      <div class="info-block">
        <div class="info-block-title">📦 Условия хранения</div>
        <div class="info-block-text">${p.storage}</div>
      </div>

      <a class="sheet-link" href="${p.url}" target="_blank">
        🛒 Открыть на сайте Vertera
      </a>
    </div>
  `;

  document.getElementById("overlay").classList.add("show");
  setTimeout(() => document.getElementById("detailSheet").classList.add("open"), 10);
  document.body.style.overflow = "hidden";

  // Telegram back button
  if (window.Telegram?.WebApp?.BackButton) {
    Telegram.WebApp.BackButton.show();
    Telegram.WebApp.BackButton.onClick(closeSheet);
  }
}

function closeSheet() {
  document.getElementById("detailSheet").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
  document.body.style.overflow = "";
  if (window.Telegram?.WebApp?.BackButton) {
    Telegram.WebApp.BackButton.hide();
  }
}

// ══════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════
const searchInput = document.getElementById("searchInput");
const searchClear = document.getElementById("searchClear");

searchInput.addEventListener("input", () => {
  searchQuery = searchInput.value.trim();
  searchClear.style.display = searchQuery ? "block" : "none";
  renderGrid();
});

function clearSearch() {
  searchInput.value = "";
  searchQuery = "";
  searchClear.style.display = "none";
  searchInput.focus();
  renderGrid();
}

// ══════════════════════════════════════════════
//  CATEGORY TABS
// ══════════════════════════════════════════════
document.querySelectorAll(".cat-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentCat = tab.dataset.cat;
    renderGrid();
  });
});

// ══════════════════════════════════════════════
//  TELEGRAM WEB APP INIT
// ══════════════════════════════════════════════
if (window.Telegram?.WebApp) {
  const tg = Telegram.WebApp;
  tg.ready();
  tg.expand();

  // Apply Telegram theme colors if dark
  if (tg.colorScheme === "dark") {
    document.documentElement.style.setProperty("--bg", "#1a1a2e");
    document.documentElement.style.setProperty("--card-bg", "#16213e");
    document.documentElement.style.setProperty("--text", "#e8f5ee");
    document.documentElement.style.setProperty("--text-muted", "#7a9e8e");
    document.documentElement.style.setProperty("--shadow", "0 4px 20px rgba(0,0,0,0.3)");
  }
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
renderGrid();
</script>
</body>
</html>
