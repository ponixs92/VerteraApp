  .header { background: linear-gradient(135deg, #1a5c3a 0%, #2d8a5e 60%, #4ecb8a 100%); padding: 14px 14px 22px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(45,138,94,0.3); }

  .logo-text { font-family: 'Raleway', sans-serif; font-weight: 800; font-size: 18px; color: #fff; letter-spacing: 1px; line-height: 1.1; }
  .logo-sub { font-size: 8px; color: rgba(255,255,255,0.75); letter-spacing: 1.5px; text-transform: uppercase; }

  .search-wrap { position: relative; }
  .search-input { width: 100%; padding: 11px 38px 11px 38px; border-radius: 50px; border: none; background: rgba(255,255,255,0.95); font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); outline: none; }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: 0.4; pointer-events: none; }
  .search-clear { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.5; cursor: pointer; display: none; background: none; border: none; padding: 4px; color: var(--text); }

  .cats-scroll { overflow-x: auto; padding: 10px 12px 0; display: flex; gap: 7px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .cats-scroll::-webkit-scrollbar { display: none; }
  .cat-tab { white-space: nowrap; padding: 6px 13px; border-radius: 50px; border: 1.5px solid #c8e6d4; background: #fff; font-size: 12px; font-family: 'Nunito', sans-serif; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all .2s; flex-shrink: 0; }
  .cat-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .grid-section { padding: 12px 10px 90px; }
  .section-title { font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 15px; color: var(--text); margin-bottom: 10px; padding: 0 2px; display: flex; align-items: center; gap: 8px; }
  .count-badge { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 50px; margin-left: auto; }

  .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; }

  .product-card { background: #fff; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform .18s; border: 1px solid rgba(45,138,94,0.07); display: flex; flex-direction: column; }
  .product-card:active { transform: scale(0.97); }

  .card-img-wrap { position: relative; width: 100%; padding-bottom: 70%; background: #edf7f2; overflow: hidden; flex-shrink: 0; }
  .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; padding: 8px; }
  .card-img-placeholder { position: absolute; inset: 0; font-size: 38px; display: none; align-items: center; justify-content: center; }

  .card-badge { position: absolute; top: 6px; left: 6px; background: var(--accent); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 50px; text-transform: uppercase; z-index: 2; }

  .card-body { padding: 9px 10px 10px; flex: 1; display: flex; flex-direction: column; background: #ffffff; }
  .card-name { font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 12px; line-height: 1.3; color: #1a1a2e; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-desc { font-size: 10.5px; color: #6b7c76; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-arrow { display: flex; align-items: center; justify-content: flex-end; margin-top: auto; padding-top: 6px; color: var(--accent); font-size: 11px; font-weight: 700; }

  .no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); display: none; }

  .no-results h3 { font-family: 'Raleway', sans-serif; font-size: 18px; margin-bottom: 6px; color: var(--text); }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; }
  .overlay.show { display: block; }

  .detail-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #ffffff; border-radius: 22px 22px 0 0; z-index: 300; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform .32s cubic-bezier(.4,0,.2,1); scrollbar-width: none; padding-bottom: 40px; }

  .sheet-img-wrap { width: 100%; height: 210px; background: #edf7f2; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-top: 6px; }
  .sheet-img { width: 100%; height: 100%; object-fit: contain; padding: 14px; }

  .sheet-title { font-family: 'Raleway', sans-serif; font-weight: 800; font-size: 20px; line-height: 1.2; color: #1a1a2e; margin-bottom: 6px; }
  .sheet-subtitle { font-size: 13px; color: #6b7c76; line-height: 1.5; margin-bottom: 14px; }

  .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tag { background: #e2f4ec; color: var(--accent); font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 50px; }
  .tag.halal { background: #fff3e0; color: #c07000; }
  .tag.kosher { background: #e8eaf6; color: #3949ab; }

  .info-block { background: #f5fbf7; border-radius: 14px; padding: 13px; margin-bottom: 9px; border-left: 3px solid var(--accent); }
  .info-block-title { font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; display: flex; align-items: center; gap: 5px; }

  .info-block-text ul { padding-left: 16px; margin-top: 4px; }

  .dosage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 8px; }
  .dosage-item { background: #fff; border-radius: 10px; padding: 8px 10px; border: 1px solid #c8e6d4; }
  .dosage-label { font-size: 9px; color: #6b7c76; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 2px; }
  .dosage-val { font-weight: 700; font-size: 12px; color: #1a1a2e; }

  .sheet-link { display: block; margin: 12px 0 0; background: var(--accent); color: #fff; text-align: center; padding: 13px; border-radius: 12px; text-decoration: none; font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 14px; }

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentCat = "all";
let searchQuery = "";

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function getBadgeHTML(badge) {
  if (!badge) return "";
  const labels = { hit: "Хит", new: "Новинка" };
  return `<div class="card-badge ${badge}">${labels[badge]}</div>`;
}

function getTagsHTML(tags) {
  return tags.map(t => {
    const labels = { vegan: "🌱 Vegan", halal: "☪️ Halal", kosher: "✡️ Kosher" };
    return `<span class="tag ${t}">${labels[t]}</span>`;
  }).join("");
}

function renderGrid() {
  const grid = document.getElementById("productsGrid");
  const noResults = document.getElementById("noResults");
  const countBadge = document.getElementById("countBadge");

  let filtered = PRODUCTS;
  if (currentCat !== "all") filtered = filtered.filter(p => p.category === currentCat);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.shortDesc.toLowerCase().includes(q) ||
      p.description.toLowerCase().includes(q) ||
      p.benefits.some(b => b.toLowerCase().includes(q))
    );
  }

  countBadge.textContent = filtered.length;

  if (!filtered.length) {
    grid.innerHTML = "";
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";

  grid.innerHTML = filtered.map(p => {
    const name = currentLang === "uz" && p.name_uz ? p.name_uz : p.name;
    const desc = currentLang === "uz" && p.shortDesc_uz ? p.shortDesc_uz : p.shortDesc;
    return `
    <div class="product-card" onclick="openProduct(${p.id})">
      <div class="card-img-wrap">
        ${getBadgeHTML(p.badge)}
        <img class="card-img" src="${p.img}" alt="${name}"
          onerror="this.style.display='none';this.nextSibling.nextSibling && (this.nextSibling.nextSibling.style.display='flex')"
          onload="this.style.display='block'"
          style="display:block"
        />
        <div class="card-img-placeholder" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:52px">${p.emoji}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${name}</div>
        <div class="card-desc">${desc}</div>
        <div class="card-arrow">${LANG[currentLang].more}</div>
      </div>
    </div>
  `;}).join("");
}

// ══════════════════════════════════════════════
//  OPEN PRODUCT DETAIL
// ══════════════════════════════════════════════
function openProduct(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;

  const isUz = currentLang === "uz";
  const pName = isUz && p.name_uz ? p.name_uz : p.name;
  const pDesc = isUz && p.shortDesc_uz ? p.shortDesc_uz : p.shortDesc;
  const pDescLong = isUz && p.description_uz ? p.description_uz : p.description;
  const pUsage = isUz && p.usage_uz ? p.usage_uz : p.usage;
  const pStorage = isUz && p.storage_uz ? p.storage_uz : p.storage;
  const pBenefits = isUz && p.benefits_uz ? p.benefits_uz : p.benefits;

  const dosageHTML = p.dosage.map(d => `
    <div class="dosage-item">
      <div class="dosage-label">${d.label}</div>
      <div class="dosage-val">${d.value}</div>
    </div>
  `).join("");

  const benefitsHTML = pBenefits.map(b => `<li>${b}</li>`).join("");

  document.getElementById("sheetInner").innerHTML = `
    <div class="sheet-img-wrap">
      <img class="sheet-img" src="${p.img}" alt="${pName}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
      />
      <div class="sheet-img-placeholder" style="display:none">${p.emoji}</div>
    </div>
    <div class="sheet-content">
      <div class="sheet-category">🌿 ${p.category}</div>
      <div class="sheet-title">${pName}</div>
      <div class="sheet-subtitle">${pDesc}</div>
      <div class="tags-row">${getTagsHTML(p.tags)}</div>

      <div class="info-block">
        <div class="info-block-title">${LANG[currentLang].about}</div>
        <div class="info-block-text">${pDescLong}</div>
      </div>

      <div class="info-block">
        <div class="info-block-title">${LANG[currentLang].benefits}</div>
        <div class="info-block-text"><ul>${benefitsHTML}</ul></div>
      </div>

      <div class="info-block">
        <div class="info-block-title">${LANG[currentLang].usage}</div>
        <div class="info-block-text">${pUsage}</div>
        <div class="dosage-grid">${dosageHTML}</div>
      </div>

      <div class="info-block">
        <div class="info-block-title">${LANG[currentLang].storage}</div>
        <div class="info-block-text">${pStorage}</div>
      </div>

      <a class="sheet-link" href="${p.url}" target="_blank">
        ${LANG[currentLang].openSite}
      </a>
    </div>
  `;

  document.getElementById("overlay").classList.add("show");
  setTimeout(() => document.getElementById("detailSheet").classList.add("open"), 10);
  document.body.style.overflow = "hidden";

  // Telegram back button
  if (window.Telegram?.WebApp?.BackButton) {
    Telegram.WebApp.BackButton.show();
    Telegram.WebApp.BackButton.onClick(closeSheet);
  }
}

function closeSheet() {
  document.getElementById("detailSheet").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
  document.body.style.overflow = "";
  if (window.Telegram?.WebApp?.BackButton) {
    Telegram.WebApp.BackButton.hide();
  }
}

// ══════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════
const searchInput = document.getElementById("searchInput");
const searchClear = document.getElementById("searchClear");

searchInput.addEventListener("input", () => {
  searchQuery = searchInput.value.trim();
  searchClear.style.display = searchQuery ? "block" : "none";
  renderGrid();
});

function clearSearch() {
  searchInput.value = "";
  searchQuery = "";
  searchClear.style.display = "none";
  searchInput.focus();
  renderGrid();
}

function setLang(lang) {
  currentLang = lang;
  const L = LANG[lang];

  // Update lang buttons
  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.classList.toggle("active", btn.textContent === lang.toUpperCase());
  });

  // Update UI text
  document.getElementById("logoSub").textContent = L.logoSub;
  document.getElementById("searchInput").placeholder = L.searchPlaceholder;
  document.getElementById("catalogTitle").textContent = L.catalogTitle;
  document.querySelector('[data-cat="all"]').textContent = L.catAll;
  document.querySelector('[data-cat="гели"]').textContent = L.catGels;
  document.querySelector('[data-cat="капсулы"]').textContent = L.catCaps;
  document.querySelector('[data-cat="косметика"]').textContent = L.catCosm;
  document.querySelector('[data-cat="наборы"]').textContent = L.catSets;
  document.getElementById("noResultsTitle").textContent = L.noResults;
  document.getElementById("noResultsSub").textContent = L.noResultsSub;

  // Re-render grid with new language
  renderGrid();
}
